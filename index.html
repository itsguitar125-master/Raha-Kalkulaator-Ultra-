<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Calc</title>
<style>
  /* Reset & basic styling */
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
  body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f0f0f0; }

  /* Card container */
  .calc-card {
    background: #fff;
    padding: 20px;
    border-radius: 20px;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    transition: transform 0.3s ease;
  }

  .calc-card:active { transform: scale(0.98); }

  /* Inputs */
  input[type="number"] {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    border: 1px solid #ccc;
    font-size: 1rem;
    transition: border 0.2s ease;
  }

  input[type="number"]:focus { border-color: #007bff; outline: none; }

  /* Button */
  button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 12px;
    background: #007bff;
    color: white;
    font-size: 1rem;
    cursor: pointer;
    transition: background 0.3s ease, transform 0.2s ease;
  }

  button:active { transform: scale(0.95); background: #0056b3; }

  /* Result */
  .result {
    margin-top: 20px;
    font-size: 1.3rem;
    text-align: center;
    color: #333;
    min-height: 1.5em;
    transition: all 0.3s ease;
  }

  /* Swipe hint */
  .swipe-hint {
    text-align: center;
    font-size: 0.8rem;
    color: #aaa;
    margin-top: 10px;
  }
</style>
</head>
<body>

<div class="calc-card" id="card">
  <h2 style="text-align:center;">💰 Money Calc</h2>
  <input type="number" id="amount" placeholder="Enter amount ($)">
  <input type="number" id="tax" placeholder="Enter tax %">
  <button id="calcBtn">Calculate Total</button>
  <div class="result" id="result"></div>
  <div class="swipe-hint">Swipe left/right to reset 🔄</div>
</div>

<script>
const amountInput = document.getElementById('amount');
const taxInput = document.getElementById('tax');
const resultDiv = document.getElementById('result');
const calcBtn = document.getElementById('calcBtn');
const card = document.getElementById('card');

// Calculate function
calcBtn.addEventListener('click', () => {
  const amount = parseFloat(amountInput.value);
  const tax = parseFloat(taxInput.value);
  if(isNaN(amount) || isNaN(tax)) {
    resultDiv.textContent = "Bruh, put some numbers 😅";
    return;
  }
  const total = amount + (amount * tax / 100);
  resultDiv.textContent = `$${total.toFixed(2)} total`;
});

// Swipe reset for mobile
let startX = 0;

card.addEventListener('touchstart', e => {
  startX = e.touches[0].clientX;
});

card.addEventListener('touchend', e => {
  const endX = e.changedTouches[0].clientX;
  if(startX - endX > 50 || endX - startX > 50) {
    amountInput.value = '';
    taxInput.value = '';
    resultDiv.textContent = '';
  }
});
</script>

</body>
</html>
