<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raha Kalkulaator Ultra 2026 💰</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif}
body{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#f0f0f5}
.calc-card{background:#fff;padding:20px;border-radius:25px;width:90%;max-width:450px;box-shadow:0 10px 30px rgba(0,0,0,0.1);transition:transform 0.3s ease}
.calc-card:active{transform:scale(0.98)}
input[type="number"]{width:100%;padding:15px;margin:10px 0;border-radius:12px;border:1px solid #ccc;font-size:1rem;transition:border 0.2s}
input[type="number"]:focus{border-color:#007bff;outline:none}
button{width:100%;padding:15px;margin-top:10px;border:none;border-radius:12px;background:#007bff;color:white;font-size:1rem;cursor:pointer;transition: background 0.3s, transform 0.2s}
button:active{transform:scale(0.95);background:#0056b3}
.result{margin-top:20px;font-size:1.2rem;text-align:center;color:#333;min-height:1.5em;transition:all 0.3s ease}
.swipe-hint{text-align:center;font-size:0.8rem;color:#aaa;margin-top:10px}
</style>
</head>
<body>

<div class="calc-card" id="card">
  <h2 style="text-align:center;">💸 Raha Kalkulaator Ultra 2026</h2>
  
  <input type="number" id="bruto" placeholder="Sisesta brutopalk (€)">
  <input type="number" id="tulud" placeholder="Muu tulu (€)">
  <input type="number" id="kulud" placeholder="Kulud kokku (€)">
  
  <button id="calcBtn">Arvuta neto & säästud 💰</button>
  <div class="result" id="result"></div>
  <div class="swipe-hint">Lükka vasakule/paremale, et nullida 🔄</div>
</div>

<script>
const bruto = document.getElementById('bruto');
const tulud = document.getElementById('tulud');
const kulud = document.getElementById('kulud');
const resultDiv = document.getElementById('result');
const calcBtn = document.getElementById('calcBtn');
const card = document.getElementById('card');

// Eesti 2026 maksud
const tulumaksRate = 0.22; // 22%
const taxFree = 700; // maksuvaba
const unemployRate = 0.016; // töötuskindlustus

function calcNetSalary(brutoSalary){
  let taxable = Math.max(brutoSalary - taxFree, 0);
  let tulumaks = taxable * tulumaksRate;
  let unemploy = brutoSalary * unemployRate;
  return brutoSalary - tulumaks - unemploy;
}

function randomVibe(msg){
  const vibes = [
    "Oled nüüd rikkis 😎",
    "Pank imetleb sind 💸",
    "Säästud level UP 🔥",
    "Issand jumal bro, palju raha 🤯",
    "Võid juba chillida 🏖️"
  ];
  return `${msg} — ${vibes[Math.floor(Math.random()*vibes.length)]}`;
}

calcBtn.addEventListener('click', () => {
  const b = parseFloat(bruto.value) || 0;
  const t = parseFloat(tulud.value) || 0;
  const k = parseFloat(kulud.value) || 0;

  let netSalary = calcNetSalary(b);
  let totalIncome = netSalary + t;
  let remaining = totalIncome - k;
  if(remaining < 0) remaining = 0;

  let budget = `
Neto palk: €${netSalary.toFixed(2)}
Kokku tulu: €${totalIncome.toFixed(2)}
Kulud: €${k.toFixed(2)}
Säästud: €${remaining.toFixed(2)}
  `;

  resultDiv.textContent = randomVibe(budget);
});

// Swipe reset
let startX = 0;
card.addEventListener('touchstart', e => { startX = e.touches[0].clientX; });
card.addEventListener('touchend', e => {
  const endX = e.changedTouches[0].clientX;
  if(Math.abs(startX - endX) > 50){
    bruto.value=''; tulud.value=''; kulud.value=''; resultDiv.textContent='';
  }
});
</script>

</body>
</html>
